<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <style>
        body {
            background: white;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        #output {
            min-width: 800px;
        }
    </style>
    <script src="vexflow.js"></script>
</head>

<body>
    <div id="output"></div>
    <script>
        const VF = Vex.Flow;

        const midiToKey = (midi) => {
            const names = ['c', 'c#', 'd', 'd#', 'e', 'f', 'f#', 'g', 'g#', 'a', 'a#', 'b'];
            const octave = Math.floor(midi / 12) - 1;
            return names[midi % 12] + '/' + octave;
        };

        const scToVexDur = (dur) => {
            if (dur >= 4) return 'w';
            if (dur >= 2) return 'h';
            if (dur >= 1) return 'q';
            if (dur >= 0.5) return '8';
            if (dur >= 0.25) return '16';
            return '32';
        };

        const createVexNote = (d, targetClef, lastStemDir = null, forceRest = false) => {
            const isActuallyRest = forceRest || d.isRest;
            const durBase = ([1.5, 3, 0.75].includes(d.dur)) ? d.dur / 1.5 : d.dur;
            const vexDur = scToVexDur(durBase) + (isActuallyRest ? 'r' : '');
            let keys = isActuallyRest ? [(targetClef === 'treble' ? 'b/4' : 'd/3')] :
                (Array.isArray(d.midi) ? d.midi.map(midiToKey) : [midiToKey(d.midi)]);

            const sn = new VF.StaveNote({ clef: targetClef, keys: keys, duration: vexDur, auto_stem: true });

            // --- LÓGICA DE MEMÓRIA PARA LINHAS CENTRAIS ---
            if (!isActuallyRest) {
                const isCenterLine = (targetClef === "treble" && keys.includes("b/4")) ||
                    (targetClef === "bass" && keys.includes("d/3"));

                if (isCenterLine && lastStemDir !== null) {
                    // Se estiver na linha central, imita a nota anterior para evitar "gangorra"
                    sn.setStemDirection(lastStemDir);
                }
            }

            if (d.dur !== durBase) sn.addModifier(new VF.Dot(), 0);
            if (!isActuallyRest) {
                keys.forEach((key, i) => { if (key.includes('#')) sn.addModifier(new VF.Accidental('#'), i); });
            }
            return sn;
        };

        window.drawMusic = (data, type, clef, timeSig) => {
            let currentStemDir = null; // Memória da haste

            const div = document.getElementById('output');
            div.innerHTML = "";
            const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);
            const context = renderer.getContext();

            const tsParts = timeSig.split('/');
            const beatsPerMeasure = parseInt(tsParts[0]);
            const beatValue = parseInt(tsParts[1]);
            const pulseUnit = 4 / beatValue;

            // --- 1. SEGMENTAÇÃO RÍTMICA ---
            let processedData = [];
            let absPos = 0;

            data.forEach(note => {
                let remaining = note.dur;
                let currentPosInMeasure = absPos % (beatsPerMeasure * pulseUnit);
                while (remaining > 0.001) {
                    let nextBoundary = Math.floor((currentPosInMeasure / pulseUnit) + 0.001) * pulseUnit + pulseUnit;
                    let space = nextBoundary - currentPosInMeasure;
                    if (remaining > space + 0.001) {
                        processedData.push({ ...note, dur: space, hasTie: !note.isRest });
                        remaining -= space;
                        currentPosInMeasure = 0;
                    } else {
                        processedData.push({ ...note, dur: remaining, hasTie: false });
                        remaining = 0;
                    }
                }
                absPos += note.dur;
            });

            // --- 2. COMPASSOS ---
            let measures = [];
            let currM = [];
            let acc = 0;
            const measureLimit = beatsPerMeasure * pulseUnit;
            processedData.forEach(d => {
                currM.push(d);
                acc += d.dur;
                if (acc >= measureLimit - 0.001) { measures.push(currM); currM = []; acc = 0; }
            });
            if (currM.length > 0) measures.push(currM);

            // --- 3. RENDERIZAÇÃO COM AGRUPAMENTO POR PULSO ---
            let startX = 20;
            let lastNoteObj = null;
            let lastDataObj = null;

            measures.forEach((mItems, idx) => {
                const dynamicWidth = Math.max(400, mItems.length * 95);
                const stave = new VF.Stave(startX, 40, (idx === 0 ? dynamicWidth + 80 : dynamicWidth));
                if (idx === 0) stave.addClef(clef).addTimeSignature(timeSig);

                // OPCIONAL: Adiciona barra final no último compasso
                if (idx === measures.length - 1) stave.setEndBarLine(VF.Barline.type.END);
                stave.setContext(context).draw();


                let currentBeatPos = 0;
                let currentGroup = [];
                let groupStemDirection = null; // Memória para o grupo atual

                // 1. MAPEAMENTO E TRATAMENTO DE HASTES
                const vNotes = mItems.map((d, i) => {
                    const sn = createVexNote(d, clef); // Cria com auto_stem: true
                    const isRest = sn.isRest();
                    const noteDur = d.dur;

                    // Lógica de Memória de Grupo
                    if (!isRest && noteDur < pulseUnit) {
                        if (currentGroup.length === 0) {
                            // Primeira nota do grupo: ela define a direção para as próximas
                            groupStemDirection = sn.getStemDirection();
                        } else if (groupStemDirection !== null) {
                            // Notas seguintes: imitam a primeira nota do grupo
                            sn.setStemDirection(groupStemDirection);
                        }
                        currentGroup.push(sn);
                    } else {
                        // Se for pausa ou nota longa (sem beam), resetamos a memória
                        groupStemDirection = null;
                        currentGroup = [];
                    }

                    // Verifica se chegamos ao fim de um pulso para resetar o grupo
                    currentBeatPos += noteDur;
                    if (Math.abs(currentBeatPos % pulseUnit) < 0.001) {
                        currentGroup = [];
                        groupStemDirection = null;
                    }

                    return sn;
                });

                // 2. VOZ E FORMATAÇÃO
                const voice = new VF.Voice({ num_beats: beatsPerMeasure, beat_value: beatValue }).setStrict(false);
                voice.addTickables(vNotes);

                // 3. CRIAÇÃO DOS BEAMS (Usando a mesma lógica de tempo que você já tinha)
                const beams = [];
                let beamGroup = [];
                let beamBeatPos = 0;

                vNotes.forEach((note, i) => {
                    const noteDur = mItems[i].dur;
                    const isRest = note.isRest();

                    if (!isRest && noteDur < pulseUnit) {
                        currentGroup.push(note);
                    } else {
                        // FECHA O GRUPO SE ENCONTRAR PAUSA OU NOTA LONGA
                        if (currentGroup.length > 1) beams.push(new VF.Beam(currentGroup));
                        currentGroup = [];
                    }

                    currentBeatPos += noteDur;

                    if (Math.abs(currentBeatPos % pulseUnit) < 0.001) {
                        // FECHA O GRUPO NO FINAL DO PULSO
                        if (currentGroup.length > 1) beams.push(new VF.Beam(currentGroup));
                        currentGroup = [];
                    }
                });

                if (currentGroup.length > 1) beams.push(new VF.Beam(currentGroup));

                const formatter = new VF.Formatter().joinVoices([voice]).format([voice], dynamicWidth - 60);

                voice.draw(context, stave);
                beams.forEach(b => b.setContext(context).draw());

                // --- AJUSTE NAS LIGADURAS (Ties) ---

                // A. Desenha ligaduras DENTRO do compasso
                for (let i = 0; i < mItems.length - 1; i++) {
                    if (mItems[i].hasTie) {
                        new VF.StaveTie({ first_note: vNotes[i], last_note: vNotes[i + 1] }).setContext(context).draw();
                    }
                }

                // B. NOVO: Desenha ligadura NA VIRADA do compasso
                if (lastNoteObj && lastDataObj && lastDataObj.hasTie) {
                    new VF.StaveTie({
                        first_note: lastNoteObj,
                        last_note: vNotes[0]
                    }).setContext(context).draw();
                }

                // C. NOVO: Atualiza a memória para o próximo compasso
                lastNoteObj = vNotes[vNotes.length - 1];
                lastDataObj = mItems[mItems.length - 1];

                startX += stave.getWidth();
                renderer.resize(startX + 200, 400);
            });
        };
    </script>
</body>

</html>
